<body class="bg-dark">
    <div class="dropdown" id="idiom">
        <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
         Lenguage
        </button>
        <ul class="dropdown-menu">
          <li><button class="dropdown-item" type="button"><a href="../views/Index.html" href="#"
            class="link-dark" style="text-decoration:none">Spanish</a></button></li>
          <li><button class="dropdown-item" type="button">English</button></li>
          
        </ul>
      </div>
    <h1 class="text-primary">Inmogestion SA</h1>
    <div class="container p-2">
        <div class="card mx-3 mt-n5 shadow-lg" style="border-radius: 10px; border-left: 8px #007bff solid;
        border-right: none; border-top: none; border-bottom: none;">
            <div class="card-body">
                <h3 class="text-primary text-upercase mb-3">Mortgage calculation</h3>
                <form action="" id="fmortgage" onsubmit="return calculatemortgage(event)" method="get" target="_self">
                    <div class="row">
                        <div class="col">
                            <label for="fcuota" class="form-label">Initial fee</label>
                            <input type="text" name="" id="fcuota" class="form form-control">
                        </div>
                        <div class="col">

                            <label for="fvalortotal">Total property value</label>
                            <input type="text" name="" id="fvalortotal" class="form form-control">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col">
                            <label for="finteres">Interest rate</label>
                            <input type="text" name="" id="finteres" class="form form-control">
                        </div>
                        <div class="col">

                            <label for="fplazo">Terms in years</label>
                            <input type="text" name="" id="fplazo" class="form form-control">
                        </div>
                    </div>
                    <br />

                        <button type="submit" class="btn-primary" style="border-radius: 4px;">Calculate</button>
                        <button class="btn-primary" style="border-radius: 4px;" onclick="resetForm()">Restart form</button>
                    

                </form>
            </div>
        </div>
    </div>
    <div>
        <h1 class="text-primary text-upercase mb-3">Result</h1>
        <label for="omotoprestamo" class="text-warning">Starting amount</label>
        <output id="omotoprestamo" class="form-control">0 </output>

        <label for="ocuota" class="text-warning">Value of the initial installment</label>
        <output id="ocuota" class="form-control">0 </output>
X-UA-Compatible
        <script src="../js/morgage.js"></script>
    </div>
    <br>
    <div class="accordion" id="accordionExample">
        <div class="accordion-item">
          <h2 class="accordion-header">
            <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne" aria-expanded="true" aria-controls="collapseOne">
                Check our offers
            </button>
          </h2>
          <div id="collapseOne" class="accordion-collapse collapse show" data-bs-parent="#accordionExample">
            <div class="accordion-body">
              <strong>We can help you requesting a credit in your bank </strong>our service is completely free
            </div>
          </div>
        </div>
        <div class="accordion-item">
          <h2 class="accordion-header">
            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTwo" aria-expanded="false" aria-controls="collapseTwo">
              Suscribe to our newsletter
            </button>
          </h2>
          <div id="collapseTwo" class="accordion-collapse collapse" data-bs-parent="#accordionExample">
            <div class="accordion-body">
                Leave us your datas <button class="btn-primary" style="border-radius: 4px;" onclick="window.location.href='../views english/contactEn.html'">Suscribe</button>
            </div>
          </div>
        </div>
        
      </div>
